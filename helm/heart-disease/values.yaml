replicaCount: 2

image:
  repository: heart-disease-api
  tag: v1
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  host: heart-api.local
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

healthcheck:
  livenessPath: /health
  readinessPath: /health
  initialDelaySeconds: 15
  periodSeconds: 20

env:
  LOG_LEVEL: "INFO"
  MODEL_PATH: "/app/models/best_model.pkl"